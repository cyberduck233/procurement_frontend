{% extends "account/base.html" %}
{% load i18n %}
{% load account %}

{% block head_title %}{% trans "Change Password" %}{% endblock %}

{% block content_title %}密码重置成功{% endblock %}
{% block content_subtitle %}您的密码已成功更改{% endblock %}

{% block auth_content %}
<p style="text-align: center; color: #333; margin-bottom: 20px;">
    您现在可以使用新密码登录了。
</p>
<div style="text-align: center;">
    <a href="{% url 'account_login' %}" class="btn-primary"
        style="display: inline-block; padding: 12px 20px; width: 100%; box-sizing: border-box; text-decoration: none; text-align: center;">立即登录</a>
</div>
{% endblock %}
