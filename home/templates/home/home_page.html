{% extends "base.html" %}
{% load static wagtailcore_tags %}

{% block body_class %}home-page{% endblock %}

{% block content %}
<div class="home-banner">
    <div class="container">
        <h1 class="banner-title">{{ page.banner_title }}</h1>
        {% if page.banner_subtitle %}
        <p class="banner-subtitle">{{ page.banner_subtitle }}</p>
        {% endif %}

        <div class="search-box">
            <form action="/announcements/" method="get">
                <input type="text" name="search" placeholder="{{ page.search_placeholder }}" class="search-input">
                <button type="submit" class="search-button">搜索</button>
            </form>
        </div>
    </div>
</div>

<div class="function-section">
    <div class="container">
        <div class="function-grid">
            <a href="/announcements/" class="function-card">
                <div class="function-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h3>公告检索</h3>
                <p>查询招标公告、中标公告等各类采购信息</p>
            </a>

            <a href="/reports/" class="function-card">
                <div class="function-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                </div>
                <h3>需求调查报告</h3>
                <p>查看和分析各类采购需求调查报告</p>
            </a>
        </div>
    </div>
</div>
{% endblock %}
